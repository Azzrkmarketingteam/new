[theme]
primaryColor = "#00ff88"
backgroundColor = "#0a0a0f"
secondaryBackgroundColor = "#12121a"
textColor = "#ffffff"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
